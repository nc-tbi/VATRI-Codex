openapi: "3.1.0"
info:
  title: Amendment Service API
  version: "1.0.0"
  description: |
    Tax Core amendment service — versioned VAT filing amendments (ADR-005, ADR-006).
    Bounded context: Amendment. No in-place mutation; each amendment increments assessment_version.
    Publishes to tax-core.amendment.created.

servers:
  - url: http://localhost:3005
    description: Local development

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      tags: [Health]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /amendments:
    post:
      operationId: createAmendment
      summary: Create a versioned amendment
      description: |
        Creates an amendment record comparing original vs new staged assessment.
        Computes delta_net_vat and delta_classification. Sets new_claim_required
        when result_type changes or |delta| >= 0.01 DKK.
      tags: [Amendments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AmendmentRequest"
      responses:
        "201":
          description: Amendment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AmendmentResponse"
        "422":
          description: Amendment validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /amendments/{filing_id}:
    get:
      operationId: getAmendmentsForFiling
      summary: List amendments for a filing
      tags: [Amendments]
      parameters:
        - name: filing_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Original filing ID
      responses:
        "200":
          description: Amendment history for the filing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AmendmentListResponse"

components:
  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
        service:
          type: string

    StagedAssessment:
      type: object
      required: [filing_id, trace_id, rule_version_id, assessed_at, stage4_net_vat, result_type, claim_amount]
      properties:
        filing_id:
          type: string
        trace_id:
          type: string
        rule_version_id:
          type: string
        assessed_at:
          type: string
          format: date-time
        stage1_gross_output_vat:
          type: number
        stage2_total_deductible_input_vat:
          type: number
        stage3_pre_adjustment_net_vat:
          type: number
        stage4_net_vat:
          type: number
        result_type:
          type: string
          enum: [payable, refund, zero]
        claim_amount:
          type: number

    AmendmentRequest:
      type: object
      required: [original_filing_id, taxpayer_id, original_assessment, new_assessment]
      properties:
        original_filing_id:
          type: string
          format: uuid
        taxpayer_id:
          type: string
        original_assessment:
          $ref: "#/components/schemas/StagedAssessment"
        new_assessment:
          $ref: "#/components/schemas/StagedAssessment"

    AmendmentRecord:
      type: object
      required:
        - amendment_id
        - original_filing_id
        - prior_assessment_version
        - new_assessment_version
        - taxpayer_id
        - tax_period_end
        - delta_net_vat
        - delta_classification
        - new_claim_required
        - created_at
        - trace_id
      properties:
        amendment_id:
          type: string
          format: uuid
        original_filing_id:
          type: string
          format: uuid
        prior_assessment_version:
          type: integer
        new_assessment_version:
          type: integer
        taxpayer_id:
          type: string
        tax_period_end:
          type: string
          format: date
        delta_net_vat:
          type: number
        delta_classification:
          type: string
          enum: [increase, decrease, neutral]
        new_claim_required:
          type: boolean
        created_at:
          type: string
          format: date-time
        trace_id:
          type: string

    AmendmentResponse:
      type: object
      required: [trace_id, amendment]
      properties:
        trace_id:
          type: string
        amendment:
          $ref: "#/components/schemas/AmendmentRecord"

    AmendmentListResponse:
      type: object
      required: [trace_id, filing_id, amendments]
      properties:
        trace_id:
          type: string
        filing_id:
          type: string
          format: uuid
        amendments:
          type: array
          items:
            $ref: "#/components/schemas/AmendmentRecord"

    ErrorResponse:
      type: object
      required: [error, trace_id]
      properties:
        error:
          type: string
        message:
          type: string
        trace_id:
          type: string
