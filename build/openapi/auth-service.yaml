openapi: 3.1.0
info:
  title: Auth Service
  version: 1.1.0
  description: |
    Authentication and session management for the VATRI self-service portal.
    Provides JWT-based access tokens + refresh token rotation with PostgreSQL persistence.
    Seeded admin account available in local/dev only (ADMIN_SEED_ENABLED env guard).
    Startup fails if SESSION_SIGNING_KEY is missing.
    Aligned with ADR-009 (portal BFF + API-first ingress) and design/portal/02-auth-and-rbac-contract.md.

servers:
  - url: http://localhost:3009
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: auth-service

  /auth/login:
    post:
      summary: Authenticate user and issue token pair
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      summary: Invalidate refresh token and end session
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  description: Refresh token to revoke
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  trace_id:
                    type: string
                  message:
                    type: string
                    example: logged out

  /auth/refresh:
    post:
      summary: Rotate refresh token and issue new access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me:
    get:
      summary: Return authenticated user claims
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User claims
          content:
            application/json:
              schema:
                type: object
                properties:
                  trace_id:
                    type: string
                  user:
                    $ref: "#/components/schemas/UserClaims"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          format: password
          example: admin

    AuthResponse:
      type: object
      properties:
        trace_id:
          type: string
        session_id:
          type: string
          format: uuid
        access_token:
          type: string
          description: HS256 JWT, expires in 15 minutes
        refresh_token:
          type: string
          description: UUID, rotated on each refresh, expires in 7 days
        expires_in:
          type: integer
          description: Access token TTL in seconds
          example: 900
        user:
          $ref: "#/components/schemas/UserClaims"

    UserClaims:
      type: object
      properties:
        subject_id:
          type: string
          format: uuid
        role:
          type: string
          enum:
            - admin
            - taxpayer
        taxpayer_scope:
          type: string
          nullable: true
          description: Taxpayer ID scope for taxpayer role; null for admin

    ErrorEnvelope:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        trace_id:
          type: string

  responses:
    BadRequest:
      description: Bad request — missing or invalid fields
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Unauthorized:
      description: Authentication failed — invalid credentials or token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
