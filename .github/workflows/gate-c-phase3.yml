name: Gate C - Phase 3

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  phase3-full-cycle:
    name: phase3-full-cycle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: build/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run migration compatibility smoke
        run: npm run ci:migration-compat

      - name: Run full Phase 3 same-cycle gate
        run: npm run ci:phase3

      - name: Publish Phase 3 and migration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase3-full-cycle-artifacts
          path: |
            build/reports/migration-compat-runtime-snapshot.json
            build/reports/migration-compat-canonical-snapshot.json
            build/reports/migration-compat-diff.json
            build/reports/phase3-guardrails.json
            build/reports/phase3-integration-vitest.json
            build/reports/phase3-resilience-vitest.json
            build/reports/phase3-observability-vitest.json
